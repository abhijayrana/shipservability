name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud compute ssh arana@shipservability \
            --zone=us-west1-b \
            --project=shipservability \
            --command="cd /home/arana/shipservability && git pull && npm install --omit=dev && sudo systemctl restart shipservability" \
            --quiet
